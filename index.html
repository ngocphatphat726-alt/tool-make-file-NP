<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uchiha Modz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0505;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(18, 10, 10, 0.85);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 20px;
            padding: 25px 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .avatar-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #ff3333;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .key-input, .file-input-label {
            width: 100%;
            padding: 12px 14px;
            background-color: #140808;
            border: 1px solid rgba(255, 50, 50, 0.4);
            border-radius: 10px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .key-input::placeholder {
            color: #885555;
        }

        .key-input:focus {
            border-color: #ff3333;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .mode-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .mode-btn {
            padding: 10px 5px;
            background: #140808;
            border: 1px solid rgba(255, 50, 50, 0.4);
            border-radius: 8px;
            color: #885555;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #cc0000, #880000);
            color: #ffffff;
            border-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .hex-box {
            background: #050202;
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #885555;
            text-align: left;
            height: 85px;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
            line-height: 1.4;
        }

        .hex-box::-webkit-scrollbar {
            width: 3px;
        }
        .hex-box::-webkit-scrollbar-thumb {
            background: #ff3333;
            border-radius: 10px;
        }

        .file-input-label {
            display: block;
            cursor: pointer;
            background: linear-gradient(135deg, #2b0808, #1a0505);
            margin-bottom: 12px;
            color: #ffaaaa;
        }
        .file-input-label:hover {
            border-color: #ff3333;
            color: #fff;
        }
        input[type="file"] {
            display: none;
        }

        #message {
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 600;
            min-height: 16px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(135deg, #2b0808, #1a0505);
            border: 1px solid rgba(255, 50, 50, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, #cc0000, #880000);
            border-color: #ff4d4d;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            border-color: #00ff66;
            background: rgba(0, 255, 102, 0.1);
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #004422, #00ff66);
        }

        .key-hint {
            font-size: 11px;
            color: #664444;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .key-hint span {
            color: #ff6666;
            font-weight: bold;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 10000;
            animation: slideIn 0.5s ease;
            font-weight: bold;
            max-width: 350px;
            font-size: 13px;
        }
        .toast-success {
            background: rgba(0, 255, 102, 0.2);
            border: 1px solid #00ff66;
            color: #00ff66;
        }
        .toast-error {
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366;
            color: #ff3366;
        }
        .toast-warning {
            background: rgba(255, 204, 0, 0.2);
            border: 1px solid #ffcc00;
            color: #ffcc00;
        }
        .toast-info {
            background: rgba(0, 191, 255, 0.2);
            border: 1px solid #00bfff;
            color: #00bfff;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 0, 0, 0.1);
            border-top: 2px solid #ff3333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Key Status Display */
        .key-status-bar {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .key-status-bar .key-name-display {
            font-family: monospace;
            color: #ffaaaa;
            font-size: 13px;
        }
        .key-status-bar .key-time-display {
            font-size: 13px;
            font-weight: bold;
        }
        .key-status-bar .key-time-display .time-green {
            color: #00ff66;
        }
        .key-status-bar .key-time-display .time-yellow {
            color: #ffcc00;
        }
        .key-status-bar .key-time-display .time-red {
            color: #ff3333;
        }
        .key-status-bar .key-expired-badge {
            color: #ff3333;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-badge {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .status-active {
            background: rgba(0, 255, 102, 0.2);
            color: #00ff66;
            border: 1px solid #00ff66;
        }
        .status-expired {
            background: rgba(255, 51, 102, 0.2);
            color: #ff3366;
            border: 1px solid #ff3366;
        }
        .status-near {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
            border: 1px solid #ffcc00;
        }

        .key-list-item {
            background: rgba(0, 10, 20, 0.6);
            border: 1px solid rgba(255, 50, 50, 0.15);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .key-list-item:hover {
            border-color: #ff3333;
        }
        .key-list-item .key-name {
            font-family: monospace;
            font-size: 13px;
            color: #ffaaaa;
        }
        .key-list-item .key-info {
            font-size: 11px;
            color: #886666;
        }
        .key-list-item .key-actions {
            display: flex;
            gap: 6px;
        }
        .key-list-item .key-actions button {
            background: none;
            border: none;
            color: #886666;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .key-list-item .key-actions button:hover {
            color: #ff3333;
        }

        .admin-panel {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 50, 50, 0.2);
            padding-top: 15px;
        }
        .admin-panel summary {
            cursor: pointer;
            color: #885555;
            font-size: 12px;
            font-weight: 600;
        }
        .admin-panel summary:hover {
            color: #ffaaaa;
        }
        .admin-panel .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .admin-panel .quick-actions .btn {
            font-size: 11px;
            padding: 6px 12px;
            flex: none;
        }

        .logout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            flex-direction: column;
            gap: 20px;
        }
        .logout-overlay.show {
            display: flex;
        }
        .logout-overlay .big-icon {
            font-size: 60px;
            color: #ff3333;
        }
        .logout-overlay .big-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff3333;
        }
        .logout-overlay .sub-text {
            color: #886666;
            font-size: 14px;
        }
        .logout-overlay .btn {
            max-width: 200px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Logout Overlay -->

        <div class="big-icon">🔒</div>
        <div class="big-text">KEY ĐÃ HẾT HẠN</div>
        <div class="sub-text" id="logoutReason">Key đã hết hạn hoặc bị xóa</div>
        <button class="btn" onclick="location.reload()">
            <i class="fa-solid fa-arrow-right"></i> Quay lại đăng nhập
        </button>
    </div>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="avatar-container">
            <img src="https://sf-static.upanhlaylink.com/img/image_2026072327a3054446ab924ba09ace8e25a3a7ec.jpg" alt="Avatar" class="avatar">
        </div>

        <h1 class="title">Uchiha Modz</h1>

        <!-- TRANG 1: Nhập Key -->
        <div id="page1" class="section active">
            <div class="input-group">
                <input type="text" id="keyInput" class="key-input" placeholder="Nhập Key..." spellcheck="false">

            <div class="btn-row">

                    <i class="fa-solid fa-comment-dots"></i> ZALO
                </a>
                <button class="btn" id="nextBtn">
                    Tiếp tục <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
            <div class="key-hint">🔑 MUA KEY LIÊN HỆ: 0976457016</div>
        </div>

        <!-- TRANG 2: Chọn Mode, Sửa & Tải file -->
        <div id="page2" class="section">
            <!-- Key Status Bar -->
            <div class="key-status-bar" id="keyStatusBar">
                <span class="key-name-display" id="currentKeyDisplay">🔑 Loading...</span>
                <span class="key-time-display" id="keyTimeDisplay">

                <div id="hexContent">Chờ nhập file data-cache để chạy mã...</div>

                <i class="fa-solid fa-folder-open"></i> <span id="fileNameText">Chọn file make data-cache</span>
                <input type="file" id="fileInput">

            <div id="message"></div>

                </button>

                <button class="btn" id="actionBtn" disabled>
                    <i class="fa-solid fa-download"></i> Tải File (ZIP)

            </div>

            <!-- Admin Panel - Hiển thị danh sách key từ Firebase -->
            <div class="admin-panel">
                <details>
                    <summary>🔑 Danh sách key (Firebase)</summary>
                    <div id="keyListContainer" style="margin-top:10px;max-height:150px;overflow-y:auto;">
                        <div style="text-align:center;color:#664444;font-size:12px;">
                            <span class="loading-spinner"></span> Đang tải...
                        </div>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCGkhT2kvWVPMiMrsADX04tyZSj6ueRHtg",
            authDomain: "yamate-efab6.firebaseapp.com",
            databaseURL: "https://yamate-efab6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yamate-efab6",
            storageBucket: "yamate-efab6.firebasestorage.app",
            messagingSenderId: "352037727100",
            appId: "1:352037727100:web:abe3e49eb1f7555e9392f9"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ============================================================
        //  STATE
        // ============================================================
        let selectedMode = "aimbody";
        let uploadedFile = null;
        let processedBlob = null;
        let processedFileName = "";
        let streamInterval = null;
        let allKeys = {};
        let currentUserKey = null;
        let keyCheckInterval = null;
        let keyWatchRef = null;
        let isLoggedIn = false;
        let logoutReason = '';

        // ============================================================
        //  DOM Elements
        // ============================================================
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const keyInput = document.getElementById('keyInput');
        const msg1 = document.getElementById('msg1');
        const fileInput = document.getElementById('fileInput');
        const fileNameText = document.getElementById('fileNameText');
        const msg = document.getElementById('message');
        const actionBtn = document.getElementById('actionBtn');
        const hexBox = document.getElementById('hexBox');
        const hexContent = document.getElementById('hexContent');
        const keyListContainer = document.getElementById('keyListContainer');
        const keyStatusBar = document.getElementById('keyStatusBar');
        const currentKeyDisplay = document.getElementById('currentKeyDisplay');
        const keyTimeDisplay = document.getElementById('keyTimeDisplay');
        const logoutOverlay = document.getElementById('logoutOverlay');
        const logoutReasonEl = document.getElementById('logoutReason');

        // ============================================================
        //  TOAST SYSTEM
        // ============================================================
        let toastTimeout = null;

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            if (toastTimeout) clearTimeout(toastTimeout);

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // ============================================================
        //  LOGOUT FUNCTION
        // ============================================================
        function forceLogout(reason) {
            if (!isLoggedIn) return;
            
            isLoggedIn = false;
            logoutReason = reason;
            logoutReasonEl.textContent = reason;
            
            // Dừng tất cả interval và listener
            if (keyCheckInterval) {
                clearInterval(keyCheckInterval);
                keyCheckInterval = null;
            }
            if (keyWatchRef) {
                keyWatchRef.off();
                keyWatchRef = null;
            }
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }

            // Reset trạng thái
            currentUserKey = null;
            actionBtn.disabled = true;
            
            // Hiển thị overlay
            logoutOverlay.classList.add('show');
            
            showToast('🔒 ' + reason, 'error');
        }

        // ============================================================
        //  KIỂM TRA KEY (mỗi 5 giây)
        // ============================================================
        async function checkKeyStatus() {
            if (!currentUserKey || !isLoggedIn) return;

            try {
                const snapshot = await db.ref(`keys/${currentUserKey}`).once('value');
                
                // Nếu key không còn tồn tại (bị xóa)
                if (!snapshot.exists()) {
                    forceLogout('Key đã bị xóa khỏi hệ thống!');
                    return;
                }

                const data = snapshot.val();
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expDate = new Date(data.expires);
                expDate.setHours(0, 0, 0, 0);

                // Kiểm tra hết hạn
                if (expDate < today) {
                    forceLogout('Key đã hết hạn!');
                    return;
                }

                // Cập nhật thời gian hiển thị
                updateTimeDisplay(expDate);

            } catch (error) {
                console.warn('Lỗi kiểm tra key:', error);
                // Không force logout vì có thể lỗi mạng tạm thời
            }
        }

        // ============================================================
        //  CẬP NHẬT HIỂN THỊ THỜI GIAN
        // ============================================================
        function updateTimeDisplay(expDate) {
            const now = new Date();
            const diffMs = expDate - now;
            
            if (diffMs <= 0) {
                keyTimeDisplay.innerHTML = `<span class="time-red">⛔ ĐÃ HẾT HẠN</span>`;
                return;
            }

            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));

            let timeStr = '';
            let colorClass = 'time-green';

            if (diffDays > 3) {
                timeStr = `${diffDays} ngày ${diffHours}h`;
                colorClass = 'time-green';
            } else if (diffDays > 0) {
                timeStr = `${diffDays} ngày ${diffHours}h ${diffMinutes}p`;
                colorClass = 'time-yellow';
            } else if (diffHours > 0) {
                timeStr = `${diffHours}h ${diffMinutes}p`;
                colorClass = 'time-yellow';
            } else {
                timeStr = `${diffMinutes} phút`;
                colorClass = 'time-red';
            }

            // Cảnh báo nếu sắp hết (dưới 1 ngày)
            let warningIcon = '';
            if (diffDays === 0 && diffHours < 24) {
                warningIcon = '⚠️ ';
                if (diffHours < 1) {
                    warningIcon = '🚨 ';
                }
            }

            keyTimeDisplay.innerHTML = `
                <span class="${colorClass}">${warningIcon}${timeStr}</span>
                ${diffDays < 3 ? ' <span class="status-badge status-near" style="font-size:9px;">Sắp hết</span>' : ''}
            `;
        }

        // ============================================================
        //  THEO DÕI KEY REAL-TIME (bị xóa, thay đổi)
        // ============================================================
        function watchKeyChanges(keyName) {
            if (keyWatchRef) {
                keyWatchRef.off();
                keyWatchRef = null;
            }

            keyWatchRef = db.ref(`keys/${keyName}`);
            keyWatchRef.on('value', (snapshot) => {
                if (!isLoggedIn) return;

                // Nếu key không tồn tại (bị xóa)
                if (!snapshot.exists()) {
                    forceLogout('Key đã bị xóa khỏi hệ thống!');
                    return;
                }

                const data = snapshot.val();
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expDate = new Date(data.expires);
                expDate.setHours(0, 0, 0, 0);

                // Nếu hết hạn
                if (expDate < today) {
                    forceLogout('Key đã hết hạn!');
                    return;
                }

                // Cập nhật thời gian
                updateTimeDisplay(expDate);
                
                // Cập nhật thông tin key
                const devicesUsed = (data.activeUsers || []).length;
                currentKeyDisplay.textContent = `🔑 ${keyName} (📱 ${devicesUsed}/${data.devices})`;

            }, (error) => {
                console.warn('Lỗi theo dõi key:', error);
            });
        }

        // ============================================================
        //  VERIFY KEY VỚI FIREBASE
        // ============================================================
        async function verifyKeyWithFirebase(key) {
            try {
                const snapshot = await db.ref(`keys/${key}`).once('value');
                if (!snapshot.exists()) {
                    return { valid: false, error: 'Key không tồn tại!' };
                }

                const data = snapshot.val();
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expDate = new Date(data.expires);
                expDate.setHours(0, 0, 0, 0);

                if (expDate < today) {
                    return { valid: false, error: 'Key đã hết hạn!' };
                }

                const activeUsers = data.activeUsers || [];
                if (activeUsers.length >= data.devices) {
                    return { valid: false, error: 'Key đã đạt giới hạn thiết bị!' };
                }

                return { valid: true, data: data, expDate: expDate };
            } catch (error) {
                return { valid: false, error: 'Lỗi kết nối Firebase: ' + error.message };
            }
        }

        // ============================================================
        //  XỬ LÝ NHẬP KEY
        // ============================================================
        nextBtn.addEventListener('click', async function() {
            const val = keyInput.value.trim();
            if (!val) {
                msg1.innerText = "❌ Vui lòng nhập key!";
                msg1.style.color = "#ff3333";
                return;
            }

            msg1.innerText = "⏳ Đang kiểm tra key...";
            msg1.style.color = "#ffaa00";

            const result = await verifyKeyWithFirebase(val);
            if (result.valid) {
                currentUserKey = val;
                isLoggedIn = true;
                
                msg1.innerText = "";
                msg1.style.color = "#00ff66";
                msg1.innerText = "✅ Key hợp lệ!";

                // Chuyển sang trang 2
                setTimeout(() => {
                    page1.classList.remove('active');
                    page2.classList.add('active');
                    
                    // Hiển thị thông tin key
                    currentKeyDisplay.textContent = `🔑 ${val} (📱 0/${result.data.devices})`;
                    updateTimeDisplay(result.expDate);
                    
                    // Bắt đầu theo dõi key real-time
                    watchKeyChanges(val);
                    
                    // Bắt đầu kiểm tra định kỳ 5 giây
                    if (keyCheckInterval) {
                        clearInterval(keyCheckInterval);
                    }
                    keyCheckInterval = setInterval(checkKeyStatus, 5000);
                    
                    // Load danh sách key
                    loadKeyList();
                    
                    showToast(`✅ Đăng nhập thành công với key: ${val}`, 'success');
                }, 400);
            } else {
                msg1.innerText = "❌ " + result.error;
                msg1.style.color = "#ff3333";
            }
        });

        // Thêm sự kiện Enter
        keyInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                nextBtn.click();
            }
        });

        // ============================================================
        //  QUAY LẠI (có cleanup)
        // ============================================================
        backBtn.addEventListener('click', function() {
            // Cleanup
            if (keyCheckInterval) {
                clearInterval(keyCheckInterval);
                keyCheckInterval = null;
            }
            if (keyWatchRef) {
                keyWatchRef.off();
                keyWatchRef = null;
            }
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }
            
            isLoggedIn = false;
            currentUserKey = null;
            
            page2.classList.remove('active');
            page1.classList.add('active');
            
            hexContent.innerHTML = "Chờ nhập file data-cache để chạy mã...";
            hexBox.style.color = "#885555";
            hexBox.style.borderColor = "rgba(255, 50, 50, 0.2)";
            msg.innerText = "";
            actionBtn.disabled = true;
            fileNameText.innerText = "Chọn file make data-cache";
            keyTimeDisplay.innerHTML = `<span class="time-green">⏳ Đã đăng xuất</span>`;
            currentKeyDisplay.textContent = '🔑 Đã đăng xuất';
        });

        // ============================================================
        //  MODE BUTTONS
        // ============================================================
        const modeButtons = document.querySelectorAll('.mode-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                modeButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedMode = this.getAttribute('data-mode');
            });
        });

        // ============================================================
        //  GENERATE RANDOM HEX
        // ============================================================
        function generateRandomHex(mode) {
            let hexChars = "0123456789ABCDEF";
            let line = "0x" + hexChars[Math.floor(Math.random() * 16)] + hexChars[Math.floor(Math.random() * 16)];
            for (let i = 0; i < 6; i++) {
                line += " " + hexChars[Math.floor(Math.random() * 16)] + hexChars[Math.floor(Math.random() * 16)];
            }
            return `${line} -> [${mode.toUpperCase()}_PATCHING...]`;
        }

        // ============================================================
        //  FILE INPUT HANDLER
        // ============================================================
        fileInput.addEventListener('change', function(e) {
            if (!isLoggedIn) {
                showToast('❌ Vui lòng đăng nhập trước!', 'error');
                return;
            }

            const file = e.target.files[0];
            if (!file) return;

            fileNameText.innerText = file.name;
            uploadedFile = file;
            actionBtn.disabled = true;

            hexBox.style.color = "#00ff66";
            hexBox.style.borderColor = "rgba(0, 255, 102, 0.4)";
            hexContent.innerHTML = "<div>[INIT] Khởi động tiến trình Modz...</div>";

            msg.style.color = "#ffaa00";
            msg.innerText = "Đang kiểm tra định dạng file...";

            if (streamInterval) clearInterval(streamInterval);
            streamInterval = setInterval(() => {
                let logRow = document.createElement('div');
                logRow.innerText = generateRandomHex(selectedMode);
                hexContent.appendChild(logRow);

                if (hexContent.children.length > 30) {
                    hexContent.removeChild(hexContent.firstChild);
                }
                hexBox.scrollTop = hexBox.scrollHeight;
            }, 60);

            let countdown = 21;
            const timer = setInterval(() => {
                if (countdown > 0) {
                    msg.innerText = `Đang make file... (${countdown}s)`;
                    countdown--;
                } else {
                    clearInterval(timer);
                    clearInterval(streamInterval);
                    processFileContent(file);
                }
            }, 1000);
        });

        // ============================================================
        //  PROCESS FILE CONTENT
        // ============================================================
        async function processFileContent(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                let uint8Array = new Uint8Array(arrayBuffer);

                for (let i = 0; i < Math.min(uint8Array.length, 50); i++) {
                    if (selectedMode === 'aimbody') {
                        uint8Array[i] = uint8Array[i] ^ 0x55;
                    } else if (selectedMode === 'aimco') {
                        uint8Array[i] = uint8Array[i] ^ 0x77;
                    } else if (selectedMode === 'sua') {
                        uint8Array[i] = uint8Array[i] ^ 0xAA;
                    } else if (selectedMode === 'chen') {
                        uint8Array[i] = 0xFF;
                    }
                }

                const zip = new JSZip();
                processedFileName = "Modz_" + file.name.replace(/\.[^/.]+$/, "") + ".zip";
                zip.file("moded_" + file.name, uint8Array);

                processedBlob = await zip.generateAsync({
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });

                let finalRow = document.createElement('div');
                finalRow.style.color = "#ffffff";
                finalRow.innerText = ">> STATUS: PATCHING SUCCESS & COMPRESSED ZIP!!";
                hexContent.appendChild(finalRow);
                hexBox.scrollTop = hexBox.scrollHeight;

                msg.style.color = "#00ff66";
                msg.innerText = "Make thành công! Đã đóng gói thành file ZIP.";
                actionBtn.disabled = false;

                // Cập nhật số thiết bị đang dùng trên Firebase
                if (currentUserKey && isLoggedIn) {
                    try {
                        const snapshot = await db.ref(`keys/${currentUserKey}`).once('value');
                        if (snapshot.exists()) {
                            const data = snapshot.val();
                            const activeUsers = data.activeUsers || [];
                            const deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
                            if (!activeUsers.includes(deviceId)) {
                                activeUsers.push(deviceId);
                                await db.ref(`keys/${currentUserKey}/activeUsers`).update(activeUsers);
                            }
                        }
                    } catch (e) {
                        console.warn('Không thể cập nhật activeUsers:', e);
                    }
                }

            } catch (err) {
                msg.style.color = "#ff3333";
                msg.innerText = "Lỗi xử lý đóng gói file!";
                showToast('❌ Lỗi: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  DOWNLOAD ZIP
        // ============================================================
        actionBtn.addEventListener('click', function() {
            if (!processedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(processedBlob);
            link.download = processedFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast(`✅ Đã tải file: ${processedFileName}`, 'success');
        });

        // ============================================================
        //  LOAD KEY LIST FROM FIREBASE
        // ============================================================
        function loadKeyList() {
            db.ref('keys').on('value', (snapshot) => {
                allKeys = snapshot.val() || {};
                renderKeyList();
            }, (error) => {
                keyListContainer.innerHTML = `<div style="color:#ff3333;font-size:12px;">❌ Lỗi tải key: ${error.message}</div>`;
            });
        }

        function renderKeyList() {
            const entries = Object.entries(allKeys);
            if (entries.length === 0) {
                keyListContainer.innerHTML = `<div style="color:#664444;font-size:12px;">📭 Chưa có key nào</div>`;
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '';
            entries.forEach(([name, data]) => {
                const expDate = new Date(data.expires);
                expDate.setHours(0, 0, 0, 0);
                const daysLeft = Math.floor((expDate - today) / (1000 * 60 * 60 * 24));
                const isExpired = daysLeft < 0;
                const isNear = daysLeft >= 0 && daysLeft <= 3;

                let statusClass = 'status-active';
                let statusText = '✅ Còn hạn';
                if (isExpired) {
                    statusClass = 'status-expired';
                    statusText = '❌ Hết hạn';
                } else if (isNear) {
                    statusClass = 'status-near';
                    statusText = '⚠️ Sắp hết';
                }

                const devicesUsed = (data.activeUsers || []).length;
                const isCurrentKey = (name === currentUserKey);

                html += `
                    <div class="key-list-item" style="${isCurrentKey ? 'border-color:#00ff66;' : ''}">
                        <div>
                            <span class="key-name">${name} ${isCurrentKey ? '⭐' : ''}</span>
                            <span class="status-badge ${statusClass}" style="font-size:9px;padding:1px 8px;border-radius:20px;">${statusText}</span>
                            <div class="key-info">📱 ${devicesUsed}/${data.devices} | 📅 ${data.expires}</div>
                        </div>
                        <div class="key-actions">
                            <button onclick="copyKey('${name}')" title="Copy key">📋</button>
                        </div>
                    </div>
                `;
            });

            keyListContainer.innerHTML = html;
        }

        // ============================================================
        //  COPY KEY
        // ============================================================
        function copyKey(keyName) {
            navigator.clipboard.writeText(keyName).then(() => {
                showToast(`📋 Đã copy key: ${keyName}`, 'success');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = keyName;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast(`📋 Đã copy key: ${keyName}`, 'success');
            });
        }

        // ============================================================
        //  CHẶN PHÍM TẮT (F12, Ctrl+U, ...)
        // ============================================================
        document.addEventListener('keydown', function(event) {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                return;
            }
            if (event.keyCode == 123 ||
                (event.ctrlKey && event.shiftKey && (event.keyCode == 73 || event.keyCode == 74)) ||
                (event.ctrlKey && event.keyCode == 85)) {
                event.preventDefault();
                return false;
            }
        });

        // ============================================================
        //  KHỞI TẠO
        // ============================================================
        console.log('🔑 Uchiha Modz với Firebase đã sẵn sàng!');
        console.log('📌 Kiểm tra key mỗi 5 giây');
        console.log('🔒 Tự động đăng xuất khi key hết hạn hoặc bị xóa');
    </script>
</body>
</html>
