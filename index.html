<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uchiha Modz - OPSET 100%</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
        body { background-color:#0a0505; color:#fff; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; position:relative; overflow-x:hidden; }
        .bg-glow { position:absolute; width:320px; height:320px; background:radial-gradient(circle,rgba(255,0,0,0.25) 0%,rgba(0,0,0,0) 70%); top:50%; left:50%; transform:translate(-50%,-50%); z-index:0; pointer-events:none; }
        .card { position:relative; z-index:1; background:rgba(18,10,10,0.85); border:1px solid rgba(255,50,50,0.3); border-radius:20px; padding:25px 20px; width:100%; max-width:480px; text-align:center; box-shadow:0 0 25px rgba(255,0,0,0.15); backdrop-filter:blur(10px); }
        .avatar-container { width:90px; height:90px; margin:0 auto 15px; border-radius:50%; overflow:hidden; border:2px solid #ff3333; box-shadow:0 0 12px rgba(255,0,0,0.4); display:flex; justify-content:center; align-items:center; background-color:#000; }
        .avatar { width:100%; height:100%; object-fit:cover; object-position:center; }
        .title { font-size:18px; font-weight:700; margin-bottom:15px; color:#fff; text-shadow:0 0 8px rgba(255,0,0,0.5); }
        .section { display:none; }
        .section.active { display:block; }
        .input-group { margin-bottom:12px; position:relative; }
        .key-input { width:100%; padding:12px 14px; background-color:#140808; border:1px solid rgba(255,50,50,0.4); border-radius:10px; color:#fff; font-size:13px; outline:none; text-align:center; transition:all 0.3s; display:none; }
        .key-display { width:100%; padding:12px 14px; background-color:#0a0303; border:1px solid rgba(255,50,50,0.2); border-radius:10px; color:#555; font-size:13px; text-align:center; cursor:default; user-select:none; }
        .ip-display { width:100%; padding:8px 14px; background-color:#0a0303; border:1px solid rgba(0,255,100,0.2); border-radius:8px; color:#00ff66; font-size:11px; text-align:center; cursor:default; user-select:none; margin-bottom:6px; font-family:monospace; }
        .ip-display.locked { border-color:rgba(255,50,50,0.4); color:#ff3333; }
        .ip-display.unlocked { border-color:rgba(0,255,100,0.4); color:#00ff66; }
        .ip-list { width:100%; padding:6px 10px; background-color:#0a0303; border:1px solid rgba(255,100,100,0.15); border-radius:6px; color:#885555; font-size:10px; text-align:left; font-family:monospace; max-height:60px; overflow-y:auto; margin-bottom:8px; }
        .ip-list::-webkit-scrollbar { width:3px; }
        .ip-list::-webkit-scrollbar-track { background:#0a0303; }
        .ip-list::-webkit-scrollbar-thumb { background:#ff3333; border-radius:3px; }
        .ip-item { display:flex; justify-content:space-between; align-items:center; padding:2px 4px; border-bottom:1px solid rgba(255,50,50,0.05); }
        .ip-item .ip-text { color:#ff6666; }
        .ip-item .ip-badge { font-size:8px; background:#2a0a0a; padding:0 4px; border-radius:3px; color:#ff6666; }
        .ip-item .ip-badge.default { background:#0a2a0a; color:#66ff66; }
        .ip-item .ip-del { color:#ff3333; cursor:pointer; font-size:10px; padding:0 4px; }
        .ip-item .ip-del:hover { color:#ff0000; }
        .mode-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:10px; }
        .mode-btn { padding:7px 3px; background:#140808; border:1px solid rgba(255,50,50,0.25); border-radius:5px; color:#885555; font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s; line-height:1.2; }
        .mode-btn.active { background:linear-gradient(135deg,#cc0000,#880000); color:#fff; border-color:#ff4d4d; box-shadow:0 0 8px rgba(255,0,0,0.4); }
        .mode-btn.ios-only { border-color:rgba(0,150,255,0.4); }
        .mode-btn.ios-only.active { background:linear-gradient(135deg,#0066cc,#003366); border-color:#3399ff; box-shadow:0 0 8px rgba(0,100,255,0.4); }
        .mode-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .hex-box { background:#050202; border:1px solid rgba(255,50,50,0.2); border-radius:8px; padding:10px; margin-bottom:10px; font-family:monospace; font-size:10px; color:#885555; text-align:left; height:90px; overflow-y:hidden; position:relative; box-shadow:inset 0 0 10px rgba(0,0,0,0.8); line-height:1.5; }
        .file-input-label { display:block; padding:12px 14px; background:linear-gradient(135deg,#2b0808,#1a0505); border:1px solid rgba(255,50,50,0.4); border-radius:10px; color:#ffaaaa; font-size:13px; cursor:pointer; margin-bottom:10px; transition:all 0.3s; }
        .file-input-label:hover { border-color:#ff3333; color:#fff; }
        .file-input-label:disabled { opacity:0.3; cursor:not-allowed; }
        input[type="file"] { display:none; }
        #message { margin-bottom:10px; font-size:12px; font-weight:600; min-height:16px; }
        .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
        .btn { flex:1; min-width:80px; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; border-radius:10px; font-size:12px; font-weight:600; text-decoration:none; color:#fff; background:linear-gradient(135deg,#2b0808,#1a0505); border:1px solid rgba(255,50,50,0.4); transition:all 0.2s; cursor:pointer; }
        .btn:hover { background:linear-gradient(135deg,#cc0000,#880000); border-color:#ff4d4d; box-shadow:0 0 12px rgba(255,0,0,0.4); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-ios { border-color:rgba(0,150,255,0.4); }
        .btn-ios:hover { background:linear-gradient(135deg,#0066cc,#003366); border-color:#3399ff; }
        .btn-vip { border-color:rgba(255,200,0,0.4); }
        .btn-vip:hover { background:linear-gradient(135deg,#cc8800,#886600); border-color:#ffcc00; }
        .badge { font-size:8px; background:#2a0a0a; border-radius:3px; padding:1px 4px; color:#ff6666; margin-left:3px; }
        .badge-ios { background:#0a1a2a; color:#66aaff; }
        .badge-vip { background:#2a2a0a; color:#ffcc00; }
        .hidden { display:none !important; }
        .status-ok { color:#00ff66; }
        .status-progress { color:#ffaa00; }
        .status-error { color:#ff3333; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column; }
        .overlay h1 { color:#ff3333; font-size:24px; margin-bottom:20px; text-shadow:0 0 20px rgba(255,0,0,0.5); }
        .overlay p { color:#885555; font-size:14px; }
        .overlay .ip { color:#ff6666; font-family:monospace; font-size:18px; margin-top:10px; }
        .vip-input-row { display:flex; gap:6px; margin-bottom:8px; }
        .vip-input-row input { flex:1; padding:6px 10px; background:#140808; border:1px solid rgba(255,200,0,0.3); border-radius:6px; color:#fff; font-size:11px; outline:none; font-family:monospace; }
        .vip-input-row input:focus { border-color:#ffcc00; box-shadow:0 0 8px rgba(255,200,0,0.2); }
        .vip-input-row .btn-vip-small { padding:6px 12px; background:linear-gradient(135deg,#2a2a0a,#1a1a05); border:1px solid rgba(255,200,0,0.4); border-radius:6px; color:#ffcc00; font-size:11px; cursor:pointer; transition:all 0.2s; }
        .vip-input-row .btn-vip-small:hover { background:linear-gradient(135deg,#cc8800,#886600); border-color:#ffcc00; color:#fff; }
        .vip-input-row .btn-vip-small:disabled { opacity:0.3; cursor:not-allowed; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;">
    <!-- Overlay khi IP không hợp lệ -->
    <div id="ipOverlay" class="overlay" style="display:none;">
        <h1>⛔ TRUY CẬP BỊ TỪ CHỐI</h1>
        <p>IP của bạn không nằm trong danh sách cho phép</p>
        <div class="ip" id="currentIpDisplay">Đang kiểm tra...</div>
        <p style="margin-top:20px;font-size:12px;color:#555;">Danh sách IP cho phép:</p>
        <div id="overlayIpList" style="color:#ff6666;font-family:monospace;font-size:14px;margin-top:5px;"></div>
    </div>

    <div class="bg-glow"></div>
    <div class="card" id="mainCard">
        <div class="avatar-container">
            <img src="https://sf-static.upanhlaylink.com/img/image_2026072327a3054446ab924ba09ace8e25a3a7ec.jpg" alt="Avatar" class="avatar">
        </div>
        <h1 class="title">Uchiha Modz - OPSET 100%</h1>

        <!-- IP STATUS -->
        <div class="ip-display" id="ipStatus">🔍 Đang kiểm tra IP...</div>

        <!-- DANH SÁCH IP VIP -->
        <div class="ip-list" id="ipList">
            <div style="color:#555;font-size:9px;text-align:center;padding:2px;">-- Danh sách IP cho phép --</div>
        </div>

        <!-- THÊM IP VIP -->
        <div class="vip-input-row">
            <input type="text" id="vipIpInput" placeholder="Nhập IP VIP (vd: 192.168.1.1)" spellcheck="false">
            <button class="btn-vip-small" id="addVipBtn"><i class="fa-solid fa-plus"></i> Thêm</button>
        </div>

        <!-- PAGE 1: KEY (ẨN) -->
        <div id="page1" class="section active">
            <div class="input-group">
                <div class="key-display">🔒 SYSTEM LOCKED - IP VERIFIED</div>
                <input type="password" id="keyInput" class="key-input" value="Phatno1aimlock" readonly>
            </div>
            <div id="msg1" style="color:#ff3333;font-size:12px;margin-bottom:12px;min-height:16px;"></div>
            <div class="btn-row">
                <a href="https://zalo.me/0939251990" target="_blank" class="btn" id="zaloBtn"><i class="fa-solid fa-comment-dots"></i> Zalo</a>
                <button class="btn" id="nextBtn">Tiếp tục <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- PAGE 2: MODE + FILE -->
        <div id="page2" class="section">
            <div class="mode-grid" id="modeGrid">
                <button class="mode-btn active" data-mode="aimbody">AimBody</button>
                <button class="mode-btn" data-mode="aimco">Aim Cổ</button>
                <button class="mode-btn" data-mode="aimdrag">Aim Drag <span class="badge">kéo</span></button>
                <button class="mode-btn" data-mode="aimmagic">Aim Magic <span class="badge">90%</span></button>
                <button class="mode-btn" data-mode="dinhvi_xanh">Định vị Xanh</button>
                <button class="mode-btn" data-mode="dinhvi_hong">Định vị Hồng</button>
                <button class="mode-btn" data-mode="antena_noaim">Antena No Aim</button>
                <button class="mode-btn" data-mode="aimantena">Aim Antena</button>
                <button class="mode-btn" data-mode="aimcac">Aim Cặc</button>
                <button class="mode-btn" data-mode="aimvu">Aim Vú (Chest)</button>
                <button class="mode-btn ios-only" data-mode="mobileconfig_aimlock">AimLock iOS <span class="badge badge-ios">.mobileconfig</span></button>
                <button class="mode-btn ios-only" data-mode="mobileconfig_aimlock90">AimLock 90% <span class="badge badge-ios">.mobileconfig</span></button>
            </div>

            <div class="hex-box" id="hexBox">
                <div id="hexContent">Chờ nhập file .txt để chạy OPSET...</div>
            </div>

            <label class="file-input-label" id="fileLabel">
                <i class="fa-solid fa-folder-open"></i> <span id="fileNameText">Chọn file .txt để make OPSET</span>
                <input type="file" id="fileInput" accept=".txt">
            </label>

            <div id="message"></div>

            <div class="btn-row">
                <button class="btn" id="backBtn" style="background:#1a0505;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
                <button class="btn" id="actionBtn" disabled>
                    <i class="fa-solid fa-download"></i> Tải File (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ===== IP LIST =====
        // IP mặc định: 14.191.53.226
        let allowedIPs = ['14.191.53.226'];
        let isIpValid = false;
        let ipCheckInterval = null;
        let isLoggedIn = false;

        // Lưu vào localStorage để duy trì
        function loadIPs() {
            try {
                const saved = localStorage.getItem('uchiha_allowed_ips');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        // Đảm bảo IP mặc định luôn có
                        if (!parsed.includes('14.191.53.226')) {
                            parsed.unshift('14.191.53.226');
                        }
                        allowedIPs = parsed;
                    }
                }
            } catch(e) {}
            saveIPs();
        }

        function saveIPs() {
            try {
                localStorage.setItem('uchiha_allowed_ips', JSON.stringify(allowedIPs));
            } catch(e) {}
        }

        // ===== KEY ẨN =====
        const _0x9b = ["UGhhdG5vMWFpbWxvY2s="];
        function _verify(k) {
            try { 
                let decoded = atob(_0x9b[0]); 
                return k.trim() === decoded; 
            } catch(e) { return false; }
        }

        // ===== LẤY IP THỰC TẾ =====
        async function getCurrentIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                try {
                    const response = await fetch('https://api.my-ip.io/ip.json');
                    const data = await response.json();
                    return data.ip;
                } catch(e2) {
                    try {
                        const response = await fetch('https://ipapi.co/ip/');
                        const ip = await response.text();
                        return ip.trim();
                    } catch(e3) {
                        return null;
                    }
                }
            }
        }

        // ===== CẬP NHẬT DANH SÁCH IP =====
        function updateIPListDisplay() {
            const listEl = document.getElementById('ipList');
            const overlayList = document.getElementById('overlayIpList');
            
            let html = '<div style="color:#555;font-size:9px;text-align:center;padding:2px;">-- Danh sách IP cho phép --</div>';
            allowedIPs.forEach((ip, index) => {
                const isDefault = ip === '14.191.53.226';
                html += `<div class="ip-item">
                    <span class="ip-text">${ip}</span>
                    <span>
                        ${isDefault ? '<span class="ip-badge default">MẶC ĐỊNH</span>' : `<span class="ip-del" data-index="${index}"><i class="fa-solid fa-trash-can"></i></span>`}
                    </span>
                </div>`;
            });
            listEl.innerHTML = html;

            // Overlay
            overlayList.innerHTML = allowedIPs.map(ip => `<div style="color:#ff6666;">${ip}</div>`).join('');

            // Gán sự kiện xóa
            document.querySelectorAll('.ip-del').forEach(el => {
                el.addEventListener('click', function(e) {
                    const idx = parseInt(this.getAttribute('data-index'));
                    if (!isNaN(idx) && idx >= 0 && idx < allowedIPs.length) {
                        const ip = allowedIPs[idx];
                        if (ip === '14.191.53.226') {
                            document.getElementById('message').innerText = '❌ Không thể xóa IP mặc định!';
                            document.getElementById('message').style.color = '#ff3333';
                            return;
                        }
                        allowedIPs.splice(idx, 1);
                        saveIPs();
                        updateIPListDisplay();
                        // Kiểm tra lại IP hiện tại
                        checkIP();
                        document.getElementById('message').innerText = `✅ Đã xóa IP: ${ip}`;
                        document.getElementById('message').style.color = '#00ff66';
                    }
                });
            });
        }

        // ===== THÊM IP VIP =====
        document.getElementById('addVipBtn').addEventListener('click', function() {
            const input = document.getElementById('vipIpInput');
            const ip = input.value.trim();
            
            // Validate IP đơn giản
            const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipPattern.test(ip)) {
                document.getElementById('message').innerText = '❌ IP không hợp lệ! Định dạng: xxx.xxx.xxx.xxx';
                document.getElementById('message').style.color = '#ff3333';
                return;
            }
            
            // Kiểm tra từng phần tử
            const parts = ip.split('.');
            for (let p of parts) {
                const num = parseInt(p);
                if (num < 0 || num > 255) {
                    document.getElementById('message').innerText = '❌ IP không hợp lệ! Giá trị 0-255';
                    document.getElementById('message').style.color = '#ff3333';
                    return;
                }
            }

            if (allowedIPs.includes(ip)) {
                document.getElementById('message').innerText = `⚠️ IP ${ip} đã tồn tại!`;
                document.getElementById('message').style.color = '#ffaa00';
                return;
            }

            allowedIPs.push(ip);
            saveIPs();
            updateIPListDisplay();
            input.value = '';
            document.getElementById('message').innerText = `✅ Đã thêm IP VIP: ${ip}`;
            document.getElementById('message').style.color = '#00ff66';
            
            // Kiểm tra lại IP hiện tại
            checkIP();
        });

        // Enter để thêm IP
        document.getElementById('vipIpInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('addVipBtn').click();
            }
        });

        // ===== KIỂM TRA IP =====
        async function checkIP() {
            const currentIP = await getCurrentIP();
            const ipStatus = document.getElementById('ipStatus');
            const overlay = document.getElementById('ipOverlay');
            const currentIpDisplay = document.getElementById('currentIpDisplay');
            
            if (currentIP) {
                currentIpDisplay.innerText = `IP của bạn: ${currentIP}`;
            } else {
                currentIpDisplay.innerText = 'Không thể lấy IP';
            }

            // Cập nhật overlay list
            const overlayList = document.getElementById('overlayIpList');
            overlayList.innerHTML = allowedIPs.map(ip => `<div style="color:#ff6666;">${ip}</div>`).join('');

            const isAllowed = allowedIPs.includes(currentIP);

            if (isAllowed && currentIP) {
                isIpValid = true;
                ipStatus.className = 'ip-display unlocked';
                ipStatus.innerText = `✅ IP: ${currentIP} - ĐÃ XÁC THỰC`;
                overlay.style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
                enableControls(true);
                
                if (!isLoggedIn) {
                    isLoggedIn = true;
                }
            } else {
                isIpValid = false;
                ipStatus.className = 'ip-display locked';
                ipStatus.innerText = `❌ IP: ${currentIP || 'Không xác định'} - KHÔNG ĐƯỢC PHÉP`;
                overlay.style.display = 'flex';
                document.getElementById('mainCard').style.display = 'none';
                enableControls(false);
                
                if (isLoggedIn) {
                    isLoggedIn = false;
                    document.getElementById('page2').classList.remove('active');
                    document.getElementById('page1').classList.add('active');
                    document.getElementById('fileInput').value = '';
                    document.getElementById('actionBtn').disabled = true;
                    document.getElementById('hexContent').innerHTML = 'Chờ nhập file .txt để chạy OPSET...';
                    document.getElementById('message').innerText = '⛔ IP bị từ chối - Đã đăng xuất!';
                    document.getElementById('message').style.color = '#ff3333';
                }
            }
        }

        // ===== ENABLE/DISABLE CONTROLS =====
        function enableControls(enable) {
            const btns = document.querySelectorAll('.mode-btn, #nextBtn, #backBtn, #actionBtn, .file-input-label, #zaloBtn, #addVipBtn');
            btns.forEach(btn => {
                btn.disabled = !enable;
                btn.style.opacity = enable ? '1' : '0.3';
                btn.style.cursor = enable ? 'pointer' : 'not-allowed';
            });
            const fileInput = document.getElementById('fileInput');
            fileInput.disabled = !enable;
            const vipInput = document.getElementById('vipIpInput');
            vipInput.disabled = !enable;
            vipInput.style.opacity = enable ? '1' : '0.3';
        }

        // ===== START IP CHECK =====
        async function startIPCheck() {
            loadIPs();
            updateIPListDisplay();
            await checkIP();
            if (ipCheckInterval) clearInterval(ipCheckInterval);
            ipCheckInterval = setInterval(checkIP, 5000);
        }

        // ===== STATE =====
        let selectedMode = "aimbody";
        let uploadedFile = null;
        let processedBlob = null;
        let processedFileName = "";
        let streamInterval = null;
        let isIOSMode = false;

        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const keyInput = document.getElementById('keyInput');
        const msg1 = document.getElementById('msg1');

        // ===== ẨN KEY =====
        keyInput.type = "password";
        keyInput.value = "Phatno1aimlock";
        keyInput.readOnly = true;
        keyInput.style.display = "none";
        
        const keyDisplay = document.querySelector('.key-display');
        keyDisplay.innerText = "🔒 SYSTEM ACTIVATED - OPSET READY";

        keyInput.addEventListener('keydown', function(e) { e.preventDefault(); return false; });
        keyInput.addEventListener('keyup', function(e) { e.preventDefault(); return false; });
        keyInput.addEventListener('keypress', function(e) { e.preventDefault(); return false; });
        keyInput.addEventListener('input', function(e) { this.value = "Phatno1aimlock"; return false; });
        keyInput.addEventListener('paste', function(e) { e.preventDefault(); return false; });
        keyInput.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        keyInput.addEventListener('focus', function(e) { this.blur(); return false; });

        // ===== XỬ LÝ NEXT =====
        nextBtn.addEventListener('click', function() {
            if (!isIpValid) {
                msg1.innerText = "❌ IP không hợp lệ!";
                return;
            }
            if (!isLoggedIn) {
                isLoggedIn = true;
            }
            page1.classList.remove('active');
            page2.classList.add('active');
            msg1.innerText = "";
        });

        backBtn.addEventListener('click', function() {
            page2.classList.remove('active');
            page1.classList.add('active');
        });

        // ===== MODE BUTTONS =====
        const modeButtons = document.querySelectorAll('.mode-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                if (!isIpValid) return;
                modeButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedMode = this.getAttribute('data-mode');
                isIOSMode = selectedMode.startsWith('mobileconfig');
                const label = document.getElementById('fileNameText');
                if (isIOSMode) {
                    label.innerText = 'Chọn file .txt -> make .mobileconfig (iOS)';
                } else {
                    label.innerText = 'Chọn file .txt -> make .cache';
                }
                document.getElementById('fileInput').value = '';
                uploadedFile = null;
                processedBlob = null;
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('hexContent').innerHTML = 'Chờ nhập file .txt để chạy OPSET...';
                document.getElementById('message').innerText = '';
            });
        });

        // ===== FILE INPUT =====
        const fileInput = document.getElementById('fileInput');
        const fileNameText = document.getElementById('fileNameText');
        const msg = document.getElementById('message');
        const actionBtn = document.getElementById('actionBtn');
        const hexBox = document.getElementById('hexBox');
        const hexContent = document.getElementById('hexContent');

        function generateRandomHex(mode) {
            let hexChars = "0123456789ABCDEF";
            let line = "0x" + hexChars[Math.floor(Math.random()*16)] + hexChars[Math.floor(Math.random()*16)];
            for(let i=0; i<6; i++) {
                line += " " + hexChars[Math.floor(Math.random()*16)] + hexChars[Math.floor(Math.random()*16)];
            }
            let modeLabel = mode.toUpperCase();
            if (mode.includes('mobileconfig')) modeLabel = 'MOBILECONFIG';
            return `${line} -> [${modeLabel}_OPSET_100%...]`;
        }

        function generateMobileConfig(aimPercent) {
            const percent = aimPercent || 90;
            const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
            return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadDescription</key>
            <string>Uchiha OPSET - AimLock ${percent}%</string>
            <key>PayloadDisplayName</key>
            <string>OPSET ${percent}%</string>
            <key>PayloadIdentifier</key>
            <string>com.uchiha.opset.${uuid}</string>
            <key>PayloadType</key>
            <string>com.apple.security</string>
            <key>PayloadUUID</key>
            <string>${uuid}</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
            <key>PayloadOrganization</key>
            <string>Uchiha Modz</string>
            <key>OPSET</key>
            <dict>
                <key>Enabled</key>
                <true/>
                <key>AimAssist</key>
                <real>${percent / 100}</real>
                <key>AimDrag</key>
                <real>0.${percent}</real>
                <key>Targeting</key>
                <dict>
                    <key>Body</key>
                    <real>1.0</real>
                    <key>Head</key>
                    <real>0.95</real>
                    <key>Chest</key>
                    <real>0.85</real>
                    <key>Groin</key>
                    <real>0.70</real>
                    <key>Antena</key>
                    <real>0.90</real>
                </dict>
                <key>AntiRecoil</key>
                <real>0.${percent}</real>
                <key>AutoAim</key>
                <true/>
                <key>OPVersion</key>
                <string>6.0</string>
            </dict>
        </dict>
    </array>
    <key>PayloadDescription</key>
    <string>Uchiha OPSET Profile - 100%</string>
    <key>PayloadDisplayName</key>
    <string>Uchiha OPSET ${percent}%</string>
    <key>PayloadIdentifier</key>
    <string>com.uchiha.opset.profile</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>${uuid}</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
    <key>PayloadOrganization</key>
    <string>Uchiha Modz</string>
</dict>
</plist>`;
        }

        function applyOPCache(uint8Array, mode) {
            const len = uint8Array.length;
            const header = new Uint8Array([0x4F, 0x50, 0x53, 0x45, 0x54, 0x5F, 0x56, 0x36]); // OPSET_V6
            
            let signature = [];
            switch(mode) {
                case 'aimbody': signature = [0x42, 0x4F, 0x44, 0x59, 0x01, 0xAA, 0x55, 0xAA]; break;
                case 'aimco': signature = [0x48, 0x45, 0x41, 0x44, 0x02, 0xBB, 0x77, 0xBB]; break;
                case 'aimdrag': signature = [0x44, 0x52, 0x41, 0x47, 0x03, 0xDD, 0xEE, 0x5A]; break;
                case 'aimmagic': signature = [0x4D, 0x41, 0x47, 0x49, 0x43, 0x5A, 0xCC, 0xFF]; break;
                case 'dinhvi_xanh': signature = [0x47, 0x52, 0x45, 0x45, 0x4E, 0x01, 0x88, 0x22]; break;
                case 'dinhvi_hong': signature = [0x50, 0x49, 0x4E, 0x4B, 0x02, 0x66, 0x44, 0x66]; break;
                case 'antena_noaim': signature = [0x41, 0x4E, 0x54, 0x45, 0x4E, 0x41, 0x00, 0x11]; break;
                case 'aimantena': signature = [0x41, 0x4D, 0x41, 0x4E, 0x54, 0x01, 0x99, 0x66]; break;
                case 'aimcac': signature = [0x47, 0x52, 0x4F, 0x49, 0x4E, 0x03, 0xCC, 0x88]; break;
                case 'aimvu': signature = [0x43, 0x48, 0x45, 0x53, 0x54, 0x02, 0xAA, 0x44]; break;
                default: signature = [0x44, 0x45, 0x46, 0x41, 0x55, 0x4C, 0x54, 0xAA];
            }

            const outputLength = header.length + signature.length + len;
            const output = new Uint8Array(outputLength);
            output.set(header, 0);
            output.set(signature, header.length);
            
            const dataStart = header.length + signature.length;
            for (let i = 0; i < len; i++) {
                let val = uint8Array[i];
                val = val ^ 0x5A;
                val = (val + i) & 0xFF;
                val = val ^ 0xA5;
                if (i % 7 === 0) val = val ^ 0x3C;
                if (i % 13 === 0) val = val ^ 0x5E;
                output[dataStart + i] = val;
            }

            const footer = new Uint8Array([0x4F, 0x50, 0x45, 0x4E, 0x44]); // OPEND
            const finalLength = outputLength + footer.length;
            const final = new Uint8Array(finalLength);
            final.set(output, 0);
            final.set(footer, outputLength);

            return final;
        }

        fileInput.addEventListener('change', function(e) {
            if (!isIpValid) {
                msg.style.color = "#ff3333";
                msg.innerText = "❌ IP không hợp lệ!";
                return;
            }
            
            const file = e.target.files[0];
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.txt')) {
                msg.style.color = "#ff3333";
                msg.innerText = "❌ LỖI: Chỉ chấp nhận file .txt!";
                return;
            }

            fileNameText.innerText = file.name;
            uploadedFile = file;
            actionBtn.disabled = true;

            hexBox.style.color = "#00ff66";
            hexBox.style.borderColor = "rgba(0,255,102,0.4)";
            hexContent.innerHTML = "<div>[INIT] Khởi động OPSET Engine v6.0...</div>";
            msg.style.color = "#ffaa00";
            msg.innerText = "Đang xử lý OPSET 100%...";

            if (streamInterval) clearInterval(streamInterval);
            streamInterval = setInterval(() => {
                let logRow = document.createElement('div');
                logRow.innerText = generateRandomHex(selectedMode);
                hexContent.appendChild(logRow);
                if (hexContent.children.length > 30) {
                    hexContent.removeChild(hexContent.firstChild);
                }
                hexBox.scrollTop = hexBox.scrollHeight;
            }, 60);

            let countdown = 15;
            const timer = setInterval(() => {
                if (countdown > 0) {
                    msg.innerText = `Đang OPSET... (${countdown}s)`;
                    countdown--;
                } else {
                    clearInterval(timer);
                    clearInterval(streamInterval);
                    processFileContent(file);
                }
            }, 1000);
        });

        async function processFileContent(file) {
            try {
                const text = await file.text();
                const encoder = new TextEncoder();
                const textData = encoder.encode(text);

                if (selectedMode === 'mobileconfig_aimlock' || selectedMode === 'mobileconfig_aimlock90') {
                    const percent = selectedMode === 'mobileconfig_aimlock90' ? 90 : 70;
                    const xmlContent = generateMobileConfig(percent);
                    const blob = new Blob([xmlContent], { type: 'application/x-apple-aspen-config' });
                    
                    const zip = new JSZip();
                    processedFileName = `Uchiha_OPSET_${percent}%.mobileconfig.zip`;
                    zip.file(`Uchiha_OPSET_${percent}%.mobileconfig`, blob);
                    processedBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });

                    hexContent.innerHTML += `<div style="color:#00ff66;">>> MOBILECONFIG OPSET: ${percent}% AIMLOCK</div>`;
                    hexBox.scrollTop = hexBox.scrollHeight;
                    msg.style.color = "#00ff66";
                    msg.innerText = `✅ OPSET mobileconfig thành công! AimLock ${percent}% (từ .txt)`;
                    actionBtn.disabled = false;
                    return;
                }

                const processedData = applyOPCache(textData, selectedMode);

                const zip = new JSZip();
                const baseName = file.name.replace('.txt', '');
                processedFileName = `Uchiha_OPSET_${baseName}.zip`;
                zip.file(`opset_${baseName}.cache`, processedData);

                processedBlob = await zip.generateAsync({
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });

                let finalRow = document.createElement('div');
                finalRow.style.color = "#ffffff";
                finalRow.innerText = `>> STATUS: OPSET 100% (${selectedMode.toUpperCase()}) -> .cache`;
                hexContent.appendChild(finalRow);
                hexBox.scrollTop = hexBox.scrollHeight;

                msg.style.color = "#00ff66";
                msg.innerText = `✅ OPSET thành công! ${selectedMode} 100% (từ .txt -> .cache)`;
                actionBtn.disabled = false;

            } catch (err) {
                msg.style.color = "#ff3333";
                msg.innerText = "❌ Lỗi OPSET! " + err.message;
            }
        }

        actionBtn.addEventListener('click', function() {
            if (!processedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(processedBlob);
            link.download = processedFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // ===== CHỐNG INSPECT & COPY =====
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || e.keyCode === 85 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 67) ||
                (e.ctrlKey && e.keyCode === 86) ||
                (e.ctrlKey && e.keyCode === 88)) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
        document.addEventListener('paste', function(e) { e.preventDefault(); return false; });
        document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });

        // ===== KHỞI ĐỘNG =====
        console.clear();
        startIPCheck();
    </script>
</body>
