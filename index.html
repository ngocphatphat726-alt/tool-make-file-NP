<!DOCTYPE html>
<html lang="vi">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
        body { background-color:#0a0505; color:#fff; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; position:relative; overflow-x:hidden; }
        .bg-glow { position:absolute; width:320px; height:320px; background:radial-gradient(circle,rgba(255,0,0,0.25) 0%,rgba(0,0,0,0) 70%); top:50%; left:50%; transform:translate(-50%,-50%); z-index:0; pointer-events:none; }
        .card { position:relative; z-index:1; background:rgba(18,10,10,0.85); border:1px solid rgba(255,50,50,0.3); border-radius:20px; padding:25px 20px; width:100%; max-width:480px; text-align:center; box-shadow:0 0 25px rgba(255,0,0,0.15); backdrop-filter:blur(10px); }
        .avatar-container { width:90px; height:90px; margin:0 auto 15px; border-radius:50%; overflow:hidden; border:2px solid #ff3333; box-shadow:0 0 12px rgba(255,0,0,0.4); display:flex; justify-content:center; align-items:center; background-color:#000; }
        .avatar { width:100%; height:100%; object-fit:cover; object-position:center; }
        .title { font-size:18px; font-weight:700; margin-bottom:15px; color:#fff; text-shadow:0 0 8px rgba(255,0,0,0.5); }
        .section { display:none; }
        .section.active { display:block; }

        .key-input::placeholder { color:#885555; }
        .key-input:focus { border-color:#ff3333; box-shadow:0 0 10px rgba(255,0,0,0.5); }
        .key-input:disabled { opacity:0.6; cursor:not-allowed; background-color:#0a0303; }
        .mode-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:10px; }
        .mode-btn { padding:7px 3px; background:#140808; border:1px solid rgba(255,50,50,0.25); border-radius:5px; color:#885555; font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s; line-height:1.2; }
        .mode-btn.active { background:linear-gradient(135deg,#cc0000,#880000); color:#fff; border-color:#ff4d4d; box-shadow:0 0 8px rgba(255,0,0,0.4); }
        .mode-btn.ios-only { border-color:rgba(0,150,255,0.4); }
        .mode-btn.ios-only.active { background:linear-gradient(135deg,#0066cc,#003366); border-color:#3399ff; box-shadow:0 0 8px rgba(0,100,255,0.4); }
        .hex-box { background:#050202; border:1px solid rgba(255,50,50,0.2); border-radius:8px; padding:10px; margin-bottom:10px; font-family:monospace; font-size:10px; color:#885555; text-align:left; height:90px; overflow-y:hidden; position:relative; box-shadow:inset 0 0 10px rgba(0,0,0,0.8); line-height:1.5; }
        .file-input-label { display:block; padding:12px 14px; background:linear-gradient(135deg,#2b0808,#1a0505); border:1px solid rgba(255,50,50,0.4); border-radius:10px; color:#ffaaaa; font-size:13px; cursor:pointer; margin-bottom:10px; transition:all 0.3s; }
        .file-input-label:hover { border-color:#ff3333; color:#fff; }
        input[type="file"] { display:none; }
        #message { margin-bottom:10px; font-size:12px; font-weight:600; min-height:16px; }
        .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
        .btn { flex:1; min-width:80px; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; border-radius:10px; font-size:12px; font-weight:600; text-decoration:none; color:#fff; background:linear-gradient(135deg,#2b0808,#1a0505); border:1px solid rgba(255,50,50,0.4); transition:all 0.2s; cursor:pointer; }
        .btn:hover { background:linear-gradient(135deg,#cc0000,#880000); border-color:#ff4d4d; box-shadow:0 0 12px rgba(255,0,0,0.4); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-ios { border-color:rgba(0,150,255,0.4); }
        .btn-ios:hover { background:linear-gradient(135deg,#0066cc,#003366); border-color:#3399ff; }
        .badge { font-size:8px; background:#2a0a0a; border-radius:3px; padding:1px 4px; color:#ff6666; margin-left:3px; }
        .badge-ios { background:#0a1a2a; color:#66aaff; }
        .key-hint { font-size:10px; color:#885555; margin-top:4px; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;">
    <div class="bg-glow"></div>
    <div class="card">
        <div class="avatar-container">
            <img src="https://sf-static.upanhlaylink.com/img/image_2026072327a3054446ab924ba09ace8e25a3a7ec.jpg" alt="Avatar" class="avatar">
        </div>
        <h1 class="title">Uchiha Modz - Full Aim</h1>

        <!-- PAGE 1: KEY -->
        <div id="page1" class="section active">
            <div class="input-group">
                <input type="text" id="keyInput" class="key-input" placeholder="Nhập Key..." spellcheck="false" disabled>
            </div>
            <div id="msg1" style="color:#ff3333;font-size:12px;margin-bottom:12px;min-height:16px;"></div>
            <div class="btn-row">
                <a href="https://zalo.me/0939251990" target="_blank" class="btn"><i class="fa-solid fa-comment-dots"></i> Zalo</a>
                <button class="btn" id="nextBtn">Tiếp tục <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- PAGE 2: MODE + FILE -->
        <div id="page2" class="section">
            <div class="mode-grid" id="modeGrid">
                <button class="mode-btn active" data-mode="aimbody">AimBody</button>
                <button class="mode-btn" data-mode="aimco">Aim Cổ</button>
                <button class="mode-btn" data-mode="aimdrag">Aim Drag <span class="badge">kéo</span></button>
                <button class="mode-btn" data-mode="aimmagic">Aim Magic <span class="badge">90%</span></button>
                <button class="mode-btn" data-mode="dinhvi_xanh">Định vị Xanh</button>
                <button class="mode-btn" data-mode="dinhvi_hong">Định vị Hồng</button>
                <button class="mode-btn" data-mode="antena_noaim">Antena No Aim</button>
                <button class="mode-btn" data-mode="aimantena">Aim Antena</button>
                <button class="mode-btn" data-mode="aimcac">Aim Cặc</button>
                <button class="mode-btn" data-mode="aimvu">Aim Vú (Chest)</button>

            <div class="hex-box" id="hexBox">

            </div>

            <label class="file-input-label" id="fileLabel">
                <i class="fa-solid fa-folder-open"></i> <span id="fileNameText">Chọn file make data-cache / .mobileconfig</span>
                <input type="file" id="fileInput">
            </label>

            <div id="message"></div>

            <div class="btn-row">
                <button class="btn" id="backBtn" style="background:#1a0505;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
                <button class="btn" id="actionBtn" disabled>
                    <i class="fa-solid fa-download"></i> Tải File (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ===== KEY VERIFY =====
        // KEY MỚI: Phatno1aimlock
        // Mã hóa Base64: UGhhdG5vMWFpbWxvY2s=
        const _0x9b = ["UGhhdG5vMWFpbWxvY2s="];
        function _verify(k) {
            try { 
                let decoded = atob(_0x9b[0]); 
                return k.trim() === decoded; 
            } catch(e) { return false; }
        }

        // ===== STATE =====
        let selectedMode = "aimbody";
        let uploadedFile = null;
        let processedBlob = null;
        let processedFileName = "";
        let streamInterval = null;
        let isIOSMode = false;

        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const keyInput = document.getElementById('keyInput');
        const msg1 = document.getElementById('msg1');

        // ===== KHÓA KHÔNG CHO GHI KEY =====
        // 1. Disable input ngay từ đầu
        keyInput.disabled = true;
        keyInput.value = "Phatno1aimlock";
        
        // 2. Chặn tất cả sự kiện gõ phím trên input
        keyInput.addEventListener('keydown', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        keyInput.addEventListener('keyup', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        keyInput.addEventListener('keypress', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        keyInput.addEventListener('input', function(e) {
            this.value = "Phatno1aimlock";
            return false;
        });
        keyInput.addEventListener('paste', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        
        // 3. Chặn context menu trên input
        keyInput.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 4. Kiểm tra định kỳ để đảm bảo giá trị không bị thay đổi
        setInterval(function() {
            if (keyInput.value !== "Phatno1aimlock") {
                keyInput.value = "Phatno1aimlock";
            }
        }, 100);

        // ===== XỬ LÝ NEXT =====
        nextBtn.addEventListener('click', function() {
            // Luôn luôn đúng vì key đã được hardcode
            page1.classList.remove('active');
            page2.classList.add('active');
            msg1.innerText = "";
        });

        backBtn.addEventListener('click', function() {
            page2.classList.remove('active');
            page1.classList.add('active');
        });

        // ===== MODE BUTTONS =====
        const modeButtons = document.querySelectorAll('.mode-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                modeButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedMode = this.getAttribute('data-mode');
                isIOSMode = selectedMode.startsWith('mobileconfig');
                const label = document.getElementById('fileNameText');
                if (isIOSMode) {
                    label.innerText = 'Chọn file .mobileconfig (iOS)';
                } else {
                    label.innerText = 'Chọn file make data-cache';
                }
                document.getElementById('fileInput').value = '';
                uploadedFile = null;
                processedBlob = null;
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('hexContent').innerHTML = 'Chờ nhập file để chạy mã...';
                document.getElementById('message').innerText = '';
            });
        });

        // ===== FILE INPUT =====
        const fileInput = document.getElementById('fileInput');
        const fileNameText = document.getElementById('fileNameText');
        const msg = document.getElementById('message');
        const actionBtn = document.getElementById('actionBtn');
        const hexBox = document.getElementById('hexBox');
        const hexContent = document.getElementById('hexContent');

        function generateRandomHex(mode) {
            let hexChars = "0123456789ABCDEF";
            let line = "0x" + hexChars[Math.floor(Math.random()*16)] + hexChars[Math.floor(Math.random()*16)];
            for(let i=0; i<6; i++) {
                line += " " + hexChars[Math.floor(Math.random()*16)] + hexChars[Math.floor(Math.random()*16)];
            }
            let modeLabel = mode.toUpperCase();
            if (mode.includes('mobileconfig')) modeLabel = 'MOBILECONFIG';
            return `${line} -> [${modeLabel}_PATCHING...]`;
        }

        function generateMobileConfig(aimPercent) {
            const percent = aimPercent || 90;
            const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
            return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadDescription</key>
            <string>Uchiha AimLock - Kéo tâm ${percent}%</string>
            <key>PayloadDisplayName</key>
            <string>AimLock ${percent}%</string>
            <key>PayloadIdentifier</key>
            <string>com.uchiha.aimlock.${uuid}</string>
            <key>PayloadType</key>
            <string>com.apple.security</string>
            <key>PayloadUUID</key>
            <string>${uuid}</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
            <key>PayloadOrganization</key>
            <string>Uchiha Modz</string>
            <key>AimLock</key>
            <dict>
                <key>Enabled</key>
                <true/>
                <key>AimAssist</key>
                <real>${percent / 100}</real>
                <key>AimDrag</key>
                <real>0.${percent}</real>
                <key>Targeting</key>
                <dict>
                    <key>Body</key>
                    <real>1.0</real>
                    <key>Head</key>
                    <real>0.85</real>
                    <key>Chest</key>
                    <real>0.75</real>
                    <key>Groin</key>
                    <real>0.60</real>
                </dict>
                <key>AntiRecoil</key>
                <real>0.${percent}</real>
                <key>AutoAim</key>
                <true/>
            </dict>
        </dict>
    </array>
    <key>PayloadDescription</key>
    <string>Uchiha Modz AimLock Profile</string>
    <key>PayloadDisplayName</key>
    <string>Uchiha AimLock ${percent}%</string>
    <key>PayloadIdentifier</key>
    <string>com.uchiha.aimlock.profile</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>${uuid}</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
    <key>PayloadOrganization</key>
    <string>Uchiha Modz</string>
</dict>
</plist>`;
        }

        function applyAimPatch(uint8Array, mode) {
            const len = uint8Array.length;
            switch(mode) {
                case 'aimbody':
                    for (let i=0; i<Math.min(len, 80); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x55;
                        if (i % 3 === 0) uint8Array[i] = 0xAA;
                    }
                    if (len > 100) {
                        uint8Array[50] = 0x42; uint8Array[51] = 0x4F; uint8Array[52] = 0x44;
                        uint8Array[53] = 0x59; uint8Array[54] = 0x01;
                    }
                    break;
                case 'aimco':
                    for (let i=0; i<Math.min(len, 70); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x77;
                        if (i % 2 === 0) uint8Array[i] = 0xBB;
                    }
                    if (len > 100) {
                        uint8Array[60] = 0x48; uint8Array[61] = 0x45; uint8Array[62] = 0x41;
                        uint8Array[63] = 0x44; uint8Array[64] = 0x02;
                    }
                    break;
                case 'aimdrag':
                    for (let i=0; i<Math.min(len, 90); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x33;
                        if (i % 5 === 0) uint8Array[i] = 0xDD;
                        if (i % 7 === 0) uint8Array[i] = 0xEE;
                    }
                    if (len > 100) {
                        uint8Array[70] = 0x44; uint8Array[71] = 0x52; uint8Array[72] = 0x41;
                        uint8Array[73] = 0x47; uint8Array[74] = 0x03; uint8Array[75] = 0x5A;
                    }
                    break;
                case 'aimmagic':
                    for (let i=0; i<Math.min(len, 100); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x99;
                        if (i % 4 === 0) uint8Array[i] = 0xCC;
                        if (i % 6 === 0) uint8Array[i] = 0xFF;
                    }
                    if (len > 100) {
                        uint8Array[80] = 0x4D; uint8Array[81] = 0x41; uint8Array[82] = 0x47;
                        uint8Array[83] = 0x49; uint8Array[84] = 0x43; uint8Array[85] = 0x5A;
                    }
                    break;
                case 'dinhvi_xanh':
                    for (let i=0; i<Math.min(len, 60); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x22;
                        if (i % 2 === 0) uint8Array[i] = 0x88;
                    }
                    if (len > 100) {
                        uint8Array[90] = 0x47; uint8Array[91] = 0x52; uint8Array[92] = 0x45;
                        uint8Array[93] = 0x45; uint8Array[94] = 0x4E; uint8Array[95] = 0x01;
                    }
                    break;
                case 'dinhvi_hong':
                    for (let i=0; i<Math.min(len, 60); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x44;
                        if (i % 2 === 0) uint8Array[i] = 0x66;
                    }
                    if (len > 100) {
                        uint8Array[90] = 0x50; uint8Array[91] = 0x49; uint8Array[92] = 0x4E;
                        uint8Array[93] = 0x4B; uint8Array[94] = 0x02;
                    }
                    break;
                case 'antena_noaim':
                    for (let i=0; i<Math.min(len, 50); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x11;
                        if (i % 3 === 0) uint8Array[i] = 0x00;
                    }
                    if (len > 100) {
                        uint8Array[100] = 0x41; uint8Array[101] = 0x4E; uint8Array[102] = 0x54;
                        uint8Array[103] = 0x45; uint8Array[104] = 0x4E; uint8Array[105] = 0x41;
                        uint8Array[106] = 0x00;
                    }
                    break;
                case 'aimantena':
                    for (let i=0; i<Math.min(len, 70); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x66;
                        if (i % 4 === 0) uint8Array[i] = 0x99;
                    }
                    if (len > 100) {
                        uint8Array[100] = 0x41; uint8Array[101] = 0x49; uint8Array[102] = 0x4D;
                        uint8Array[103] = 0x41; uint8Array[104] = 0x4E; uint8Array[105] = 0x54;
                        uint8Array[106] = 0x01;
                    }
                    break;
                case 'aimcac':
                    for (let i=0; i<Math.min(len, 80); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x88;
                        if (i % 3 === 0) uint8Array[i] = 0xCC;
                    }
                    if (len > 100) {
                        uint8Array[110] = 0x47; uint8Array[111] = 0x52; uint8Array[112] = 0x4F;
                        uint8Array[113] = 0x49; uint8Array[114] = 0x4E; uint8Array[115] = 0x03;
                    }
                    break;
                case 'aimvu':
                    for (let i=0; i<Math.min(len, 70); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0x44;
                        if (i % 2 === 0) uint8Array[i] = 0xAA;
                    }
                    if (len > 100) {
                        uint8Array[120] = 0x43; uint8Array[121] = 0x48; uint8Array[122] = 0x45;
                        uint8Array[123] = 0x53; uint8Array[124] = 0x54; uint8Array[125] = 0x02;
                    }
                    break;
                default:
                    for (let i=0; i<Math.min(len, 40); i++) {
                        uint8Array[i] = uint8Array[i] ^ 0xAA;
                    }
            }
            return uint8Array;
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileNameText.innerText = file.name;
            uploadedFile = file;
            actionBtn.disabled = true;

            hexBox.style.color = "#00ff66";
            hexBox.style.borderColor = "rgba(0,255,102,0.4)";
            hexContent.innerHTML = "<div>[INIT] Khởi động tiến trình Modz...</div>";
            msg.style.color = "#ffaa00";
            msg.innerText = "Đang kiểm tra định dạng file...";

            if (streamInterval) clearInterval(streamInterval);
            streamInterval = setInterval(() => {
                let logRow = document.createElement('div');
                logRow.innerText = generateRandomHex(selectedMode);
                hexContent.appendChild(logRow);
                if (hexContent.children.length > 30) {
                    hexContent.removeChild(hexContent.firstChild);
                }
                hexBox.scrollTop = hexBox.scrollHeight;
            }, 60);

            let countdown = 21;
            const timer = setInterval(() => {
                if (countdown > 0) {
                    msg.innerText = `Đang make file... (${countdown}s)`;
                    countdown--;
                } else {
                    clearInterval(timer);
                    clearInterval(streamInterval);
                    processFileContent(file);
                }
            }, 1000);
        });

        async function processFileContent(file) {
            try {
                if (selectedMode === 'mobileconfig_aimlock' || selectedMode === 'mobileconfig_aimlock90') {
                    const percent = selectedMode === 'mobileconfig_aimlock90' ? 90 : 70;
                    const xmlContent = generateMobileConfig(percent);
                    const blob = new Blob([xmlContent], { type: 'application/x-apple-aspen-config' });
                    
                    const zip = new JSZip();
                    processedFileName = `Uchiha_AimLock_${percent}%.mobileconfig.zip`;
                    zip.file(`Uchiha_AimLock_${percent}%.mobileconfig`, blob);
                    processedBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });

                    hexContent.innerHTML += `<div style="color:#00ff66;">>> MOBILECONFIG GENERATED: ${percent}% AIMLOCK</div>`;
                    hexBox.scrollTop = hexBox.scrollHeight;
                    msg.style.color = "#00ff66";
                    msg.innerText = `Make mobileconfig thành công! AimLock ${percent}%`;
                    actionBtn.disabled = false;
                    return;
                }

                const arrayBuffer = await file.arrayBuffer();
                let uint8Array = new Uint8Array(arrayBuffer);
                uint8Array = applyAimPatch(uint8Array, selectedMode);

                const zip = new JSZip();
                processedFileName = "Modz_" + file.name.replace(/\.[^/.]+$/, "") + ".zip";
                zip.file("moded_" + file.name, uint8Array);

                processedBlob = await zip.generateAsync({
                    type: "blob",
                    compression: "DEFLATE",
                    compressionOptions: { level: 6 }
                });

                let finalRow = document.createElement('div');
                finalRow.style.color = "#ffffff";
                finalRow.innerText = `>> STATUS: PATCHING SUCCESS (${selectedMode.toUpperCase()}) + COMPRESSED ZIP!!`;
                hexContent.appendChild(finalRow);
                hexBox.scrollTop = hexBox.scrollHeight;

                msg.style.color = "#00ff66";
                msg.innerText = `Make thành công! Đã patch ${selectedMode} 100%`;
                actionBtn.disabled = false;

            } catch (err) {
                msg.style.color = "#ff3333";
                msg.innerText = "Lỗi xử lý đóng gói file! " + err.message;
            }
        }

        actionBtn.addEventListener('click', function() {
            if (!processedBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(processedBlob);
            link.download = processedFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Chống inspect
        document.addEventListener('keydown', function(event) {
            if (event.keyCode == 123 || (event.ctrlKey && event.shiftKey && (event.keyCode == 73 || event.keyCode == 74)) || (event.ctrlKey && event.keyCode == 85)) {
                event.preventDefault();
                return false;
            }
        });

        // Khóa F12, Ctrl+Shift+I, Ctrl+U
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || e.keyCode === 85 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
